source:
  provider: binance
  timeout_seconds: 30
  limit_per_request: 1000

dataset:
  symbol: BTCUSDT
  perpetual_symbol: BTCUSDT
  spot_symbol: BTCUSDT
  venue: binance
  reference_source: spot
  frequency: 1h
  start: "2021-01-01"
  end: "2026-04-07"

sources:
  perpetual:
    enabled: true
    endpoint: futures_klines
  spot:
    enabled: true
    endpoint: spot_klines
  funding:
    enabled: true
    endpoint: funding_rate_history
  open_interest:
    enabled: false
    endpoint: open_interest_hist
  index:
    enabled: false
    endpoint: index_price_history

cleaning:
  timezone: UTC
  drop_duplicates: true
  sort_ascending: true
  max_forward_fill_hours: 6
  fill_price_method: ffill
  fill_volume_value: 0.0
  fill_funding_value: 0.0
  fill_open_interest_method: ffill
  validate_frequency: true

output:
  format: parquet
  write_csv: true
  raw_subdir: data/raw
  interim_subdir: data/interim
  processed_subdir: data/processed

notes:
  assumption: The primary historical dataset uses Binance public REST endpoints for BTCUSDT hourly perpetual, spot, and funding data over 2021-01-01 to 2026-04-07 UTC.
  range_rationale: This default window is long enough to cover multiple market regimes while keeping hourly ingestion and cleaning practical for a course-project prototype.
  gap_handling_note: The default fill window is 6 hours because Binance spot history over the primary sample contains a few rare multi-hour gaps, and the canonical dataset keeps missingness flags for auditability.
  open_interest_note: Binance open interest history is supported by the interface but disabled by default because the public history endpoint is limited and venue-specific.
  end_date_note: Date-only end values are treated as inclusive UTC dates and expanded to the next day internally for hourly extraction.